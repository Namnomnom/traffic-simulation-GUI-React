services:
  # 1) PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb-ha:pg14-latest
    restart: always
    environment:
      POSTGRES_USER: masteruser
      POSTGRES_PASSWORD: masterpass
      POSTGRES_DB: traffic_data
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masteruser -d traffic_data || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - traffic-net

  # 2) pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trafficmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - traffic-net

  # 3) OSRM
  osrm:
    image: osrm/osrm-backend
    restart: unless-stopped
    command: ["osrm-routed", "--algorithm", "mld", "/data/region_C.osrm"]
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data:ro
    networks:
      - traffic-net

  # 4) SUMO + TraCI Server
  sumo:
    build:
      context: ./sumo
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "sumo",
        "--remote-port", "8813",
        "-c", "/config/config.sumocfg",
        "--start",
        "--quit-on-end", "false",
        "--end", "1000000000",
        "--no-step-log", "true",
        "--duration-log.disable", "true"
      ]
    ports:
      - "8813:8813"
    volumes:
      - ./sumo/config:/config
    networks:
      - traffic-net

  # 5) Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_DSN: "postgresql://masteruser:masterpass@postgres:5432/traffic_data"
      PORT: "8000"
      OSRM_BASE_URL: "http://osrm:5000"
      TRACI_HOST: "sumo"
      TRACI_PORT: "8813"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      osrm:
        condition: service_started
      sumo:
        condition: service_started
    networks:
      - traffic-net

  # 6) Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HOST: "0.0.0.0"
      VITE_API_URL: "http://localhost:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - traffic-net

networks:
  traffic-net:
    driver: bridge

volumes:
  pgadmin_data:
